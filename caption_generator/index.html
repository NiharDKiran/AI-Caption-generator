<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Image Caption Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🧠 AI Image Caption Generator</h1>
    <form id="uploadForm">
      <div class="custom-file">
        <input type="file" id="imageInput" accept="image/*" required />
        <label for="imageInput" class="custom-file-label">📁 Click or Drag & Drop an Image</label>
      </div>
      <button type="submit">Generate Caption</button>
    </form>
    <div id="preview">
      <img id="previewImg" src="#" alt="Image Preview" style="display: none;" />
    </div>
    <div id="result">
      <h3>Caption:</h3>
      <p id="captionText">Upload an image to get a caption.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
